<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Regresivo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="countdown-container">
        <h1>Tiempo restante hasta el cumple de mi Gordi</h1>
        
        <div class="countdown">
            <div class="box">
                <span id="days">00</span>
                <p>Días</p>
            </div>
            <div class="box">
                <span id="hours">00</span>
                <p>Horas</p>
            </div>
            <div class="box">
                <span id="minutes">00</span>
                <p>Minutos</p>
            </div>
            <div class="box">
                <span id="seconds">00</span>
                <p>Segundos</p>
            </div>
        </div>
        
        <h2 id="expired-message" class="hidden">¡Ha llegado el día! 🎉</h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
